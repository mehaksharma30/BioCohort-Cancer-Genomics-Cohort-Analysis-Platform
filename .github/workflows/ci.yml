name: CI

on:
  push:
  pull_request:

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Test Go services
        run: |
          for dir in services/shared services/api-gateway services/ingestion-service services/cohort-service services/analytics-service services/quality-service; do
            (cd "$dir" && go test ./...)
          done
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build
      - name: Build Docker images
        run: docker compose build
