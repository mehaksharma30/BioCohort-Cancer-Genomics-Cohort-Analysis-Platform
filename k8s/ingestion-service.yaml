apiVersion: apps/v1
kind: Deployment
metadata: { name: ingestion-service, namespace: biocohort }
spec:
  replicas: 1
  selector: { matchLabels: { app: ingestion-service } }
  template:
    metadata: { labels: { app: ingestion-service } }
    spec:
      containers:
        - name: ingestion-service
          image: biocohort/ingestion-service:latest
          ports: [{ containerPort: 8081 }]
          envFrom:
            - configMapRef: { name: biocohort-config }
            - secretRef: { name: biocohort-secrets }
---
apiVersion: v1
kind: Service
metadata: { name: ingestion-service, namespace: biocohort }
spec:
  selector: { app: ingestion-service }
  ports: [{ port: 8081, targetPort: 8081 }]
