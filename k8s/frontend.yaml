apiVersion: apps/v1
kind: Deployment
metadata: { name: frontend, namespace: biocohort }
spec:
  replicas: 1
  selector: { matchLabels: { app: frontend } }
  template:
    metadata: { labels: { app: frontend } }
    spec:
      containers:
        - name: frontend
          image: biocohort/frontend:latest
          ports: [{ containerPort: 5173 }]
          env:
            - { name: VITE_API_BASE_URL, value: /api }
---
apiVersion: v1
kind: Service
metadata: { name: frontend, namespace: biocohort }
spec:
  selector: { app: frontend }
  ports: [{ port: 5173, targetPort: 5173 }]
