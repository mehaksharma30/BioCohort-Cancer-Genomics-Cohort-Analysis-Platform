apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: biocohort
spec:
  replicas: 1
  selector: { matchLabels: { app: postgres } }
  template:
    metadata: { labels: { app: postgres } }
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports: [{ containerPort: 5432 }]
          env:
            - { name: POSTGRES_DB, value: biocohort }
            - { name: POSTGRES_USER, value: biocohort }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: biocohort-secrets, key: POSTGRES_PASSWORD } }
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: biocohort
spec:
  selector: { app: postgres }
  ports: [{ port: 5432, targetPort: 5432 }]
